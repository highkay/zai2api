services:
  zai2api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
  browser-helper:
    build:
      context: .
      dockerfile: browser_helper/Dockerfile
    env_file:
      - .env
    ports:
      - "${BROWSER_HELPER_PORT:-39090}:39090"
    ipc: host
    init: true
    restart: unless-stopped
